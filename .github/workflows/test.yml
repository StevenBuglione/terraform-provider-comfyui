name: Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'doc/**'
      - '*.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'doc/**'
      - '*.md'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v ./...

  generate:
    name: Verify Generated Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: make generate
      - name: Verify no changes
        run: |
          git diff --compact-summary --exit-code || \
            (echo "::error::Generated code is out of date. Run 'go generate ./...' and commit the changes." && exit 1)

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - '1.21'
          - '1.22'
          - '1.23'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - run: go mod download
      - run: go test ./... -v -timeout 120s

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: make fmt-check
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  # Acceptance tests run on schedule only (require ComfyUI instance)
  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          COMFYUI_HOST: localhost
          COMFYUI_PORT: "8188"
        run: go test ./... -v -timeout 120m
