name: Workspace Browser Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace-e2e:
    name: Workspace Browser Evidence
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: validation/workspace_e2e/browser/package-lock.json

      - run: go mod download

      - name: Install browser harness dependencies
        run: |
          npm --prefix validation/workspace_e2e/browser install
          npx --prefix validation/workspace_e2e/browser playwright install --with-deps chromium

      - name: Render fixtures and verify browser layout
        run: |
          ./scripts/workspace-e2e/run.sh
          cd validation/workspace_e2e/browser
          npx playwright test tests/workspace_layout.spec.ts --project=chromium

      - name: Upload workspace evidence artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: workspace-e2e-artifacts
          path: |
            validation/workspace_e2e/artifacts/generated/
            validation/workspace_e2e/artifacts/browser/
            validation/workspace_e2e/.runtime/global-subgraphs.json
            validation/workspace_e2e/.runtime/staged-subgraphs.json
            validation/workspace_e2e/.runtime/terraform-outputs.json
            validation/workspace_e2e/.runtime/logs/
            validation/workspace_e2e/browser/test-results/
