version: "2"
linters:
  disable:
    - dupl
    - gocyclo
  settings:
    errcheck:
      exclude-functions:
        - (github.com/hashicorp/terraform-plugin-framework/resource.CreateResponse).State.Set
        - (github.com/hashicorp/terraform-plugin-framework/resource.ReadResponse).State.Set
        - (github.com/hashicorp/terraform-plugin-framework/resource.UpdateResponse).State.Set
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party/
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party/
      - third_party$
      - builtin$
      - examples$
